# Different model example: BERT instead of DistilBERT
# BERT is slightly larger (110M vs 66M) but can sometimes perform better
# Training time will be ~1.5x longer than DistilBERT

model:
  base_model: "bert-base-uncased"  # 110M parameters (larger model)
  num_labels: 2

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules: ["query", "value"]
  bias: "none"

training:
  epochs: 2
  batch_size: 16
  learning_rate: 1.0e-4
  warmup_steps: 50
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  early_stopping_patience: 2
  seed: 42
  device: "cuda"

data:
  dataset_name: "imdb"
  max_samples: 2000
  train_test_split: 0.8
  max_length: 128
